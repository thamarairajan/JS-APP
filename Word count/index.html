<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Count</title>
    <style>
        body {
            height: 99vh;
            width: 100%;
            display: flex;
            justify-content: center;
            text-align: center;
            font-size: 18px;
        }
        div {
            padding: 20px;
            border: 1px solid gray;
        }
        textarea {
            width: 100%;
            height: 200px;
        }
    </style>
</head>
<body>
    <main>
        <div>
            <h2>Word Count App</h2>
            <textarea name="wordcount" id="txt-input" cols="30" rows="10" placeholder="Type Here.."></textarea>
            <p>Word : <span id="Word-count">0</span></p>
            <p>Charecter : <span id="Charecters-count">0</span></p>
        </div>
    </main>
    

    <script>
        const textInput = document.getElementById("txt-input");
        const displayWordInput = document.getElementById("Word-count");
        const displayCharInput = document.getElementById("Charecters-count");

        function updateCount () {
            const text = textInput.value;
            let charCount = text.length;
            let wordCount = text.trim().length > 0 ? text.trim().split(/\s+/).length : 0 ;

            displayCharInput.textContent = charCount;
            displayWordInput.textContent = wordCount;
        }
        textInput.addEventListener("input", updateCount);

    </script>
</body>
</html>
